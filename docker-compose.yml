name: citari

services:
  # Base de datos SQL Server
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SQLSERVER_PASSWORD:-YourStrong!Passw0rd}
      MSSQL_PID: Developer
    ports:
      # Puerto del host para conectar DataGrip/DBeaver/SSMS a la base dockerizada.
      # Por defecto 11433 para no chocar con un SQL Server local en 1433.
      - "${SQLSERVER_HOST_PORT:-11433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./database/scripts:/scripts:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD:-YourStrong!Passw0rd}\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - citari_network

  # Carga del esquema y el seed (una sola vez). Corre 01-07 en orden si la base
  # aun no existe; si ya esta cargada, no hace nada. Reutiliza la imagen de SQL
  # Server (ya trae sqlcmd), asi no se descarga nada extra.
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: db-init
    depends_on:
      db:
        condition: service_healthy
    environment:
      SA_PASSWORD: ${SQLSERVER_PASSWORD:-YourStrong!Passw0rd}
    volumes:
      - ./database/scripts:/scripts:ro
    entrypoint:
      - bash
      - -c
      - |
        set -e
        ALREADY=$$(/opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "$$SA_PASSWORD" -C -h -1 -W \
          -Q "SET NOCOUNT ON; IF DB_ID('citari') IS NOT NULL AND OBJECT_ID('citari.dbo.dominios','U') IS NOT NULL SELECT 1 ELSE SELECT 0" \
          | tr -d '[:space:]')
        if [ "$$ALREADY" = "1" ]; then
          echo "La base de datos ya esta inicializada; se omite la carga."
          exit 0
        fi
        for f in /scripts/01-*.sql /scripts/02-*.sql /scripts/03-*.sql /scripts/04-*.sql /scripts/05-*.sql /scripts/06-*.sql /scripts/07-*.sql; do
          echo "Ejecutando $$f"
          # -I activa SET QUOTED_IDENTIFIER ON (requerido por el indice filtrado
          # ux_reservaciones_bloque; sqlcmd lo trae OFF por defecto).
          /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "$$SA_PASSWORD" -C -b -I -i "$$f"
        done
        echo "Base de datos inicializada (15 tablas + seed + procedimientos/funciones/vistas/triggers)."
    restart: "no"
    networks:
      - citari_network

  # API FastAPI. Arranca solo cuando la base ya quedo cargada.
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: api
    environment:
      SQLSERVER_HOST: db
      SQLSERVER_PORT: 1433
      SQLSERVER_USER: sa
      SQLSERVER_PASSWORD: ${SQLSERVER_PASSWORD:-YourStrong!Passw0rd}
      SQLSERVER_DB: citari
      JWT_SECRET: ${JWT_SECRET:-dev-secret-cambiar-en-produccion-min-32-chars}
      JWT_EXPIRES_MIN: ${JWT_EXPIRES_MIN:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    depends_on:
      db-init:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - citari_network

  # Frontend Next.js en modo DESARROLLO (hot reload). El codigo se monta desde el
  # host, asi los cambios se ven en vivo en localhost:3000 sin reconstruir la imagen.
  # node_modules y .next viven en volumenes nombrados (no chocan con el host Windows).
  web:
    image: node:22-bookworm-slim
    container_name: web
    working_dir: /app
    # webpack (no turbopack): respeta el polling para que el hot reload funcione
    # sobre bind mounts de Windows/Docker.
    command: sh -c "corepack enable && pnpm install && pnpm exec next dev --webpack -H 0.0.0.0 -p 3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_API_MODE: ${NEXT_PUBLIC_API_MODE:-api}
      # Polling para que el hot reload detecte cambios sobre bind mounts de Windows.
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./apps/frontend:/app
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/.next
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - citari_network

volumes:
  sqlserver_data:
  web_node_modules:
  web_next_cache:

networks:
  citari_network:
    driver: bridge
