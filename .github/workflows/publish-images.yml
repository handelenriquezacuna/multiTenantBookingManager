name: Publish images

# Construye las imagenes de produccion del frontend y de la API y las publica
# en GHCR (GitHub Container Registry). Dockploy en el homelab solo tiene que
# vigilar estas imagenes y redeployar: el servidor nunca compila.
#
# Dispara en:
#   - push a main        -> etiquetas :main y :<sha>
#   - tags v*            -> etiquetas :vX.Y.Z y :latest
#   - ejecucion manual   -> desde la pestana Actions
#
# Variables y secretos usados:
#   - GITHUB_TOKEN                 (automatico) para publicar en GHCR
#   - vars.NEXT_PUBLIC_API_BASE_URL (opcional) URL publica de la API que se
#     incrusta en el bundle del frontend al compilar. Configurar en
#     Settings > Secrets and variables > Actions > Variables. Si no se define,
#     usa http://localhost:8000 (util solo para probar).

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            context: apps/frontend
          - name: api
            context: apps/api
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL || 'http://localhost:8000' }}
            NEXT_PUBLIC_API_MODE=api
