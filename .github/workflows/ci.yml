name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-api:
    name: Lint API (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API package with dev dependencies
        working-directory: apps/api
        run: pip install -e ".[dev]"

      - name: Run ruff check
        working-directory: apps/api
        run: ruff check app tests

      - name: Run ruff format check
        working-directory: apps/api
        run: ruff format --check app tests

      - name: Run mypy (lax config, see pyproject.toml)
        working-directory: apps/api
        run: mypy app

      - name: Check for emoji characters in app source
        run: |
          if grep -rP '[\x{1F300}-\x{1FAFF}\x{2600}-\x{27BF}]' apps/api/app; then
            echo "Emoji characters are not allowed in apps/api/app" >&2
            exit 1
          fi
          echo "No emoji characters found in apps/api/app"

  test-api:
    name: Test API (pytest unit)
    runs-on: ubuntu-latest
    needs: lint-api
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API package with dev dependencies
        working-directory: apps/api
        run: pip install -e ".[dev]"

      - name: Run unit test suite
        working-directory: apps/api
        run: pytest tests/unit -q

  build-api:
    name: Build API Docker image
    runs-on: ubuntu-latest
    needs: lint-api
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -t mbm-api:ci apps/api

      - name: Verify ODBC Driver 18 is available in the image
        run: docker run --rm mbm-api:ci python -c "import pyodbc; assert 'ODBC Driver 18 for SQL Server' in pyodbc.drivers()"

  integration:
    name: Integration tests against SQL Server
    # Pinned to 22.04 to match the Microsoft packages repo config used below.
    runs-on: ubuntu-22.04
    needs: [test-api, build-api]
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: ${{ secrets.SQLSERVER_PASSWORD || 'YourStrong!Passw0rd' }}
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install sqlcmd (mssql-tools18) on the runner
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          curl -fsSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo sed -i 's#deb \[arch=amd64,armhf,arm64\]#deb [arch=amd64,armhf,arm64 signed-by=/usr/share/keyrings/microsoft-prod.gpg]#g' /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          echo "/opt/mssql-tools18/bin" >> "$GITHUB_PATH"

      - name: Wait for SQL Server to accept connections
        env:
          SA_PASSWORD: ${{ secrets.SQLSERVER_PASSWORD || 'YourStrong!Passw0rd' }}
        run: |
          for i in $(seq 1 30); do
            /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$SA_PASSWORD" -C -Q "SELECT 1" && break
            echo "Waiting for SQL Server ($i/30)..."
            sleep 3
          done

      # Loads the full schema in numeric order: 01 (create db) + 02 (tables) +
      # 03 (seed) + 04 (procedures) + 05 (functions) + 06 (views) + 07 (triggers).
      # The integration tests call stored procedures/views, so 04-07 must run too
      # (the original pipeline stopped at 03, which predated those scripts).
      - name: Run schema + seed scripts (01-07, in order)
        env:
          SA_PASSWORD: ${{ secrets.SQLSERVER_PASSWORD || 'YourStrong!Passw0rd' }}
        run: |
          for script in database/scripts/0[1-7]-*.sql; do
            if [ -f "$script" ]; then
              echo "Running $script"
              /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$SA_PASSWORD" -C -i "$script"
            else
              echo "Skipping $script (not found)"
            fi
          done

      # check-all.sql lives in the repo-root scripts/ directory, not database/scripts/.
      - name: Run database consistency checks (check-all.sql)
        if: hashFiles('scripts/check-all.sql') != ''
        env:
          SA_PASSWORD: ${{ secrets.SQLSERVER_PASSWORD || 'YourStrong!Passw0rd' }}
        run: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$SA_PASSWORD" -C -i scripts/check-all.sql

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API package with dev dependencies
        working-directory: apps/api
        run: pip install -e ".[dev]"

      - name: Run integration test suite (if present)
        working-directory: apps/api
        env:
          SQLSERVER_HOST: localhost
          SQLSERVER_PORT: "1433"
          SQLSERVER_USER: sa
          SQLSERVER_PASSWORD: ${{ secrets.SQLSERVER_PASSWORD || 'YourStrong!Passw0rd' }}
          SQLSERVER_DB: mbm_booking
          JWT_SECRET: ci-secret-not-for-production-use-only-32b
        run: |
          if [ -d tests/integration ] && [ -n "$(find tests/integration -name 'test_*.py' -print -quit)" ]; then
            pytest tests/integration -q
          else
            echo "tests/integration does not exist yet (or is empty) - skipping"
          fi

  build-frontend:
    name: Build frontend Docker image
    runs-on: ubuntu-latest
    # apps/frontend/Dockerfile accepts NEXT_PUBLIC_API_BASE_URL / NEXT_PUBLIC_API_MODE
    # as build ARGs (Next.js inlines NEXT_PUBLIC_* at build time). Kept as
    # continue-on-error until the frontend image build is confirmed green in CI;
    # flip this off once verified.
    continue-on-error: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=http://localhost:8000 \
            --build-arg NEXT_PUBLIC_API_MODE=api \
            -t mbm-frontend:ci apps/frontend
